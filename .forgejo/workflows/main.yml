# Run a bunch of lint checks to keep me honest
name: Linting
on:
  push:
    paths:
      - '**.fish'
      - '**.py'
      - '**.sh'
      - '.forgejo/workflows/main.yml'
  pull_request:
    paths:
      - '**.fish'
      - '**.py'
      - '**.sh'
      - '.forgejo/workflows/main.yml'
  workflow_dispatch:
enable-email-notifications: true
jobs:
  fish:
    uses: nathanchance/actions-workflows/.forgejo/workflows/fish_format.yml@main
  python:
    strategy:
      fail-fast: false
      matrix:
        version: ['3.15', '3.14', '3.13', '3.12', '3.11']
    uses: nathanchance/actions-workflows/.forgejo/workflows/python_lint.yml@main
    with:
      python_version: ${{ matrix.version }}
  shellcheck:
    uses: nathanchance/actions-workflows/.forgejo/workflows/shellcheck.yml@main
  shfmt:
    uses: nathanchance/actions-workflows/.forgejo/workflows/shfmt.yml@main
