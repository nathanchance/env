[Match]
Distribution=arch

[Content]
Packages=
        # base
        base-devel

        # b4
        git-filter-repo
        patatt

        # cvise
        cvise

        # development
        diffutils
        lib32-glibc
        shfmt
        shellcheck-bin

        # email
        lei
        mutt

        # git
        github-cli
        perl-authen-sasl
        perl-mime-tools
        perl-net-smtp-ssl
        repo

        # kernel / tuxmake
        aarch64-linux-gnu-binutils
        arm-linux-gnueabi-binutils
        libelf
        inetutils
        mkinitcpio
        mips-linux-gnu-binutils
        ncurses
        pahole
        powerpc64-linux-gnu-binutils
        riscv64-linux-gnu-binutils
        s390x-linux-gnu-binutils
        rust-bindgen
        rustup
        time
        uboot-tools

        # kup
        perl-config-simple

        # LLVM/clang + build-llvm.py
        clang
        libxml2-legacy
        lld
        llvm
        ninja
        perf

        # package building
        debhelper
        devtools
        dh-autoreconf
        dpkg
        rebuild-detector
        rpm-tools

        # spdxcheck.py
        python-gitpython
        python-ply

        # QEMU
        edk2-aarch64
        edk2-ovmf
        libevent
        libutempter
        qemu-emulators-full
        qemu-guest-agent
        qemu-img
        virtiofsd

        # system administration
        ipmitool
        opendoas-sudo

        # website management
        hugo
        iproute2

[Output]
ImageId=dev-arch
