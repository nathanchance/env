[Build]
WithNetwork=true

[Content]
Bootable=false
Locale=en_US.UTF-8
Packages=
        # compression / decompression / extraction
        bzip2
        gzip
        lzop
        lz4
        pbzip2
        pigz
        tar
        unzip
        zip
        zstd

        # downloading
        curl
        wget

        # env
        fastfetch
        fzf
        jq
        less
        moreutils
        stow
        tmux
        vim
        zoxide

        # git
        git
        git-delta

        # nicer GNU utilities
        bat
        ripgrep

[Output]
Format=directory
OutputDirectory=/var/lib/machines
